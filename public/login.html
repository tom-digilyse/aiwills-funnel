<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in</title>
<style>
  :root{--primary:#004f70;--heading:#1B1D1F;--page:#f6f7f9;--btn:#004f70;--btnink:#fff;--hf:Georgia,serif;--bf:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;--line:#e5e7eb}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--bf);background:var(--page);color:#1B1D1F;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px 32px;box-shadow:0 6px 30px rgba(0,0,0,.06);text-align:center}
  .logo{max-height:64px;max-width:220px;margin:0 auto 22px;display:block}
  .wordmark{font-family:var(--hf);font-weight:700;font-size:24px;color:var(--primary);margin:0 auto 22px}
  h1{font-family:var(--hf);font-size:22px;margin:0 0 6px;color:var(--heading)}
  p.sub{color:#6b7280;font-size:14px;margin:0 0 24px}
  label{display:block;text-align:left;font-size:13px;font-weight:600;color:var(--heading);margin:0 0 6px}
  input[type=email]{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:16px}
  input[type=email]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}
  button{width:100%;padding:13px 16px;border:0;border-radius:10px;background:var(--btn);color:var(--btnink);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .note{font-size:12px;color:#9aa0a6;margin-top:18px}
  .ok{display:none}
  .ok h1{margin-bottom:10px}
  .ok .big{font-size:40px;margin-bottom:8px}
  .err{color:#b3261e;font-size:13px;margin-top:10px;min-height:16px}
</style>
</head>
<body>
  <div class="card">
    <div id="brandhead"><span class="wordmark" id="wm">Sign in</span></div>
    <div id="formview">
      <h1 id="h1">Sign in to your account</h1>
      <p class="sub">Enter your email and we will send you a secure sign-in link.</p>
      <form id="f">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        <button type="submit" id="btn">Email me a sign-in link</button>
        <div class="err" id="err"></div>
      </form>
      <div class="note">New here? Entering your email creates your account automatically.</div>
    </div>
    <div class="ok" id="okview">
      <div class="big">&#9993;</div>
      <h1>Check your email</h1>
      <p class="sub">If that address is registered, a secure sign-in link is on its way. It expires in 30 minutes.</p>
    </div>
  </div>
<script>
(function(){
  var API=(location.origin.indexOf('aiwills')>=0?location.origin:'https://aiwills.digilyse.co');
  function qp(k){try{return new URLSearchParams(location.search).get(k)||'';}catch(e){return '';}}
  var loc=qp('aw_loc')||'';
  var r=document.documentElement.style;
  function isReal(v){return v && String(v).indexOf('{'+'{')<0;}
  function applyBrand(b){
    if(!b) return;
    if(isReal(b.primary_color)){r.setProperty('--primary',b.primary_color);r.setProperty('--btn',(isReal(b.button_color)?b.button_color:b.primary_color));}
    if(isReal(b.button_text_color))r.setProperty('--btnink',b.button_text_color);
    if(isReal(b.heading_color))r.setProperty('--heading',b.heading_color);
    if(isReal(b.page_bg_color))r.setProperty('--page',b.page_bg_color);
    if(isReal(b.heading_font))r.setProperty('--hf','"'+b.heading_font+'",Georgia,serif');
    if(isReal(b.body_font))r.setProperty('--bf','"'+b.body_font+'",system-ui,sans-serif');
    try{var links=JSON.parse(b.font_css_links||'[]');links.forEach(function(u){if(isReal(u)){var l=document.createElement('link');l.rel='stylesheet';l.href=u;document.head.appendChild(l);}});}catch(e){}
    var comp=isReal(b.company_name)?b.company_name:'';
    if(comp){document.getElementById('h1').textContent='Sign in to '+comp;document.title='Sign in - '+comp;}
    var head=document.getElementById('brandhead');
    if(isReal(b.logo_url)){head.innerHTML='<img class="logo" alt="'+(comp||'Logo')+'" src="'+b.logo_url+'">';}
    else if(comp){document.getElementById('wm').textContent=comp;}
  }
  if(loc){ fetch(API+'/api/brand?locationId='+encodeURIComponent(loc)).then(function(x){return x.json();}).then(applyBrand).catch(function(){}); }
  var f=document.getElementById('f'), btn=document.getElementById('btn'), err=document.getElementById('err');
  f.addEventListener('submit',function(e){
    e.preventDefault(); err.textContent='';
    var email=document.getElementById('email').value.trim();
    if(!loc){err.textContent='This sign-in page is missing its account id.';return;}
    if(!email){return;}
    btn.disabled=true; btn.textContent='Sending...';
    fetch(API+'/api/auth-request',{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({locationId:loc,email:email})})
      .then(function(x){return x.json().catch(function(){return {};});})
      .then(function(){document.getElementById('formview').style.display='none';document.getElementById('okview').style.display='block';})
      .catch(function(){document.getElementById('formview').style.display='none';document.getElementById('okview').style.display='block';});
  });
})();
</script>
</body>
</html>
