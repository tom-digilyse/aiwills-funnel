<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manage your details</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f6f5f2;color:#1b1d1f;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{background:#fff;max-width:440px;width:92%;padding:34px 30px;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.08)}
  h1{font-size:22px;margin:0 0 6px}
  p{color:#555;line-height:1.55;margin:0 0 18px;font-size:15px}
  label{display:block;font-weight:600;margin:0 0 6px;font-size:14px}
  input{width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #d7d7d7;border-radius:10px;font-size:15px}
  button{margin-top:16px;width:100%;padding:14px;border:none;border-radius:10px;background:#0B3D2E;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:16px;font-size:14px;line-height:1.5}
  .ok{color:#0B3D2E}.bad{color:#c8100d}
</style>
</head>
<body>
<div class="card">
  <h1>Manage your details</h1>
  <p>Enter the email address you used. If it matches our records, we will send you a secure link to review and update your information.</p>
  <label for="email">Email address</label>
  <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
  <button id="go" type="button">Send me my secure link</button>
  <div class="msg" id="msg"></div>
</div>
<script>
(function(){
  var q=new URLSearchParams(location.search);
  var loc=q.get('loc')||'', funnel=q.get('funnel')||'etb', base=q.get('base')||'';
  var btn=document.getElementById('go'), email=document.getElementById('email'), msg=document.getElementById('msg');
  var API='https://aiwills.digilyse.co';
  btn.addEventListener('click', function(){
    var e=(email.value||'').trim();
    if(!/.+@.+\..+/.test(e)){ msg.className='msg bad'; msg.textContent='Please enter a valid email address.'; return; }
    if(!loc){ msg.className='msg bad'; msg.textContent='This page is missing its configuration (loc).'; return; }
    btn.disabled=true; msg.className='msg'; msg.textContent='Sending...';
    fetch(API+'/api/edit-request',{method:'POST',body:JSON.stringify({locationId:loc,email:e,funnel:funnel,returnBase:base})})
      .then(function(r){return r.json();})
      .then(function(j){ btn.disabled=false; msg.className='msg ok'; msg.textContent=(j&&j.message)||'If that email is on file, a secure edit link is on its way.'; })
      .catch(function(){ btn.disabled=false; msg.className='msg bad'; msg.textContent='Something went wrong. Please try again.'; });
  });
})();
</script>
</body>
</html>
